<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>


</head>

<body>
  <header>
    <nav>
      <div class="navbar bg-base-100 shadow-sm flex justify-between">
        <div class="flex">
          <div class=""><img class="w-9" src="./assets/github-logo.png" alt=""></div>
          <p class="text-[#1F2937] font-semibold text-[24px]">GitHub Issues Tracker</p>
        </div>

        <div class="flex gap-2">
          <input type="text" placeholder="Search..." class="border p-2 rounded">
          <button class="bg-blue-500 text-white px-4 py-2 rounded ">
            Search
          </button>
        </div>


      </div>

    </nav>
  </header>

  <main>
    <section class="w-9/12 mx-auto m-8">
      <div class="navbar bg-base-300 rounded-2xl gap-2">
        <button onclick="loadTrees()" id="allBtn" class="btn btn-ghost text-xl bg-blue-600 px-10">All</button>



        <button id="openBtn" class="btn btn-ghost text-xl px-10 ">Open</button>


        <button id="closeBtn" class="btn btn-ghost text-xl px-10 ">Close</button>
      </div>
    </section>


    <section class="flex min-w-28 bg-white rounded-2xl px-6 py-5 shadow-sm w-9/12 mx-auto">

      <div>
        <img class="bg-[#4800ff41] rounded-4xl p-2" src="./assets/Aperture.png" alt="">
      </div>

      <div class="flex flex-wrap gap-4 mb-6">
        <div>

          <p id="count-issues" class="text-[20px] text-[#1F2937] font-semibold"><span id="card-count">0</span> Issues
          </p>
          <p class="font-syne" id="stat-total">Track and manage your project issues
          </p>
        </div>



    </section>


    <section class="bg-base-100 w-9/12 mx-auto ">
      <div id="card-container" class="card grid grid-cols-4 gap-4 shadow sm">




        <!-- <div class="card-body">
          <h2 class="card-title">Card title!</h2>
          <p>A card component has a figure, a body part, and inside body there are title and actions parts</p>

        </div> -->


      </div>


    </section>

    <div id="card-container" class="grid grid-cols-3 gap-4"></div>

    <div id="details-container" class="mt-6 p-4 border rounded"></div>

  </main>






  <script src="./script-h.js"></script>
</body>

</html>
